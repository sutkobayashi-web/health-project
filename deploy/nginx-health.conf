server {
    listen 80;
    server_name health.biz-terrace.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name health.biz-terrace.org;

    ssl_certificate     /etc/letsencrypt/live/health.biz-terrace.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/health.biz-terrace.org/privkey.pem;

    # フロントエンド (静的HTML)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # アップロードファイル
    location /uploads/ {
        alias /opt/health/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # APIリクエスト
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}
